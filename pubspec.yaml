name: techfis_asset_management_mobile
description: Mobile application for Techfis Asset Management built with Flutter.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.0
  equatable: ^2.0.5
  
  # Navigation
  go_router: ^12.0.0
  
  # Dependency Injection
  get_it: ^7.6.0
  injectable: ^2.3.2
  
  # Networking
  dio: ^5.3.0
  
  # Utility
  dartz: ^0.10.1
  json_annotation: ^4.8.1
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  flutter_secure_storage: ^10.0.0
  bloc: ^8.1.4
  fl_chart: ^0.68.0
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  freezed_annotation: ^3.1.0
  shimmer: ^3.0.0
  hydrated_bloc: ^9.1.5
  path_provider: ^2.1.5
  sentry_flutter: ^9.9.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  internet_connection_checker: ^3.0.1
  cached_network_image: ^3.4.1
  formz: ^0.8.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Code Generation
  build_runner: ^2.4.6
  injectable_generator: ^2.4.1
  json_serializable: ^6.7.1
  
  # Linter
  flutter_lints: ^3.0.0
  freezed: ^3.1.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/

dependency_overrides:
  package_info_plus: 8.2.0
